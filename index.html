<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Range Rush</title>
  <style>
:root {
  color-scheme: light;
  --green: #23884c;
  --deep: #173725;
  --mint: #a8e6b4;
  --sky: #8ad7ef;
  --gold: #f4c542;
  --ink: #152019;
  --soft: #f4f7f1;
  --line: rgba(21, 32, 25, 0.14);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  color: var(--ink);
  background:
    radial-gradient(circle at 22% 16%, rgba(168,230,180,.55), transparent 28rem),
    radial-gradient(circle at 80% 86%, rgba(138,215,239,.55), transparent 30rem),
    #dfeee1;
  min-height: 100vh;
}

button,
input {
  font: inherit;
}

button {
  border: 0;
  cursor: pointer;
}

.screen {
  min-height: 100%;
  width: 100%;
}

.device-stage {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 28px;
}

.phone-shell {
  position: relative;
  width: min(430px, calc(100vw - 30px));
  aspect-ratio: 430 / 892;
  padding: 14px;
  border-radius: 54px;
  background:
    linear-gradient(145deg, #f8faf9 0%, #161a1d 10%, #050607 50%, #2b3033 92%, #f3f5f2 100%);
  box-shadow:
    0 36px 90px rgba(8, 21, 14, .36),
    inset 0 0 0 2px rgba(255,255,255,.2),
    inset 0 0 0 6px rgba(0,0,0,.75);
}

.phone-screen {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
  border-radius: 40px;
  background: var(--soft);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.14);
}

#app {
  width: 100%;
  height: 100%;
}

.dynamic-island {
  position: absolute;
  top: 11px;
  left: 50%;
  z-index: 100;
  width: 118px;
  height: 34px;
  transform: translateX(-50%);
  border-radius: 999px;
  background: #050607;
  box-shadow: inset 0 1px 2px rgba(255,255,255,.14);
  pointer-events: none;
}

.phone-side {
  position: absolute;
  width: 4px;
  border-radius: 999px;
  background: #1a1f22;
}

.phone-side-left {
  left: -3px;
  top: 150px;
  height: 78px;
}

.phone-side-right {
  right: -3px;
  top: 210px;
  height: 112px;
}

.auth {
  display: grid;
  place-items: center;
  padding: 24px;
  background:
    radial-gradient(circle at 15% 20%, rgba(255,255,255,.5), transparent 24rem),
    linear-gradient(135deg, #177f49, #79d0ed 58%, #f8dc71);
}

.auth-panel {
  width: min(440px, 100%);
  padding: 22px;
  border-radius: 8px;
  background: rgba(255,255,255,.76);
  box-shadow: 0 24px 70px rgba(0,0,0,.22);
  backdrop-filter: blur(18px);
}

.brand {
  color: white;
  text-align: center;
  margin-bottom: 18px;
  text-shadow: 0 2px 18px rgba(0,0,0,.24);
}

.brand-mark {
  font-size: 60px;
}

h1,
h2,
h3,
p {
  margin: 0;
}

.brand h1 {
  font-size: clamp(42px, 10vw, 62px);
  line-height: .94;
}

.brand p {
  margin-top: 10px;
  font-weight: 700;
}

.segmented {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  padding: 4px;
  background: rgba(23,55,37,.09);
  border-radius: 8px;
  margin-bottom: 14px;
}

.segmented button {
  padding: 10px;
  border-radius: 7px;
  background: transparent;
  color: var(--deep);
  font-weight: 800;
}

.segmented button.active {
  background: white;
  box-shadow: 0 5px 16px rgba(0,0,0,.12);
}

.field {
  width: 100%;
  padding: 13px 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  margin: 6px 0;
  background: white;
}

.primary,
.secondary,
.ghost {
  min-height: 42px;
  border-radius: 8px;
  padding: 10px 14px;
  font-weight: 900;
}

.primary {
  background: var(--deep);
  color: white;
}

.secondary {
  background: white;
  border: 1px solid var(--line);
  color: var(--deep);
}

.ghost {
  background: rgba(255,255,255,.72);
  color: var(--deep);
}

.full {
  width: 100%;
  margin-top: 10px;
}

.app-shell {
  position: relative;
  height: 100%;
  min-height: 100%;
  display: grid;
  grid-template-rows: auto 1fr auto;
  background: var(--soft);
  overflow: hidden;
}

.app-shell.range-mode {
  grid-template-rows: 1fr auto;
}

.topbar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 54px 16px 12px;
  background: rgba(255,255,255,.86);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 20;
  backdrop-filter: blur(16px);
}

.topbar h2 {
  font-size: 20px;
}

.pill {
  border-radius: 999px;
  padding: 6px 10px;
  background: rgba(35,136,76,.12);
  color: var(--green);
  font-weight: 900;
  white-space: nowrap;
}

.content {
  width: min(1120px, 100%);
  margin: 0 auto;
  padding: 18px 16px 96px;
  min-height: 0;
  overflow: auto;
}

.range-mode .content {
  width: 100%;
  height: 100%;
  padding: 0;
  overflow: hidden;
}

.tabs {
  position: absolute;
  left: 50%;
  bottom: 0;
  transform: translateX(-50%);
  z-index: 30;
  width: 100%;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  padding: 12px 10px 18px;
  border: 0;
  border-top: 1px solid var(--line);
  border-radius: 0;
  background: rgba(255,255,255,.92);
  box-shadow: 0 -10px 30px rgba(0,0,0,.14);
  backdrop-filter: blur(18px);
}

.game-menu {
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  padding: 12px 9px 13px;
  background:
    radial-gradient(ellipse at 18% 0, rgba(142,218,70,.9) 0 16px, transparent 17px),
    radial-gradient(ellipse at 78% 0, rgba(40,130,56,.72) 0 18px, transparent 19px),
    repeating-linear-gradient(90deg, rgba(255,231,158,.1) 0 1px, transparent 1px 24px),
    linear-gradient(180deg, #8b6027 0%, #6b421c 48%, #3d2410 100%);
  border-top: 3px solid #173f25;
  box-shadow:
    inset 0 3px 0 rgba(255,235,169,.18),
    0 -7px 0 rgba(47,118,40,.78),
    0 -15px 30px rgba(0,0,0,.28);
}

.game-menu::before,
.game-menu::after {
  content: "";
  position: absolute;
  top: -14px;
  width: 58px;
  height: 31px;
  background:
    radial-gradient(ellipse at 18% 65%, #71b83d 0 12px, transparent 13px),
    radial-gradient(ellipse at 44% 42%, #2f8b36 0 14px, transparent 15px),
    radial-gradient(ellipse at 72% 70%, #0f5b2d 0 12px, transparent 13px);
  filter: drop-shadow(0 2px 2px rgba(0,0,0,.28));
}

.game-menu::before {
  left: 4px;
}

.game-menu::after {
  right: 4px;
  transform: scaleX(-1);
}

.tabs button {
  padding: 12px 4px;
  border-radius: 7px;
  background: transparent;
  font-size: 13px;
  font-weight: 900;
  color: #546157;
}

.game-menu button {
  display: grid;
  place-items: center;
  min-height: 64px;
  padding: 5px 2px;
  border: 2px solid #654016;
  border-radius: 8px;
  background:
    radial-gradient(circle at 50% 12%, rgba(255,255,255,.8) 0 8px, transparent 9px),
    linear-gradient(180deg, #fff4a9 0%, #f1c550 62%, #d99c34 100%);
  color: #173725;
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,.75),
    inset 0 -4px 0 rgba(117,72,18,.16),
    0 4px 0 #3b220e,
    0 8px 10px rgba(0,0,0,.18);
  font-size: 25px;
  text-transform: uppercase;
  text-shadow: 0 1px 0 rgba(255,255,255,.75);
}

.game-menu button span {
  display: block;
  font-size: 11px;
  font-weight: 1000;
  line-height: 1;
  color: #18351d;
  text-shadow: 0 1px 0 rgba(255,255,255,.8);
}

.game-menu .play-tab {
  transform: translateY(-12px);
  min-height: 82px;
  border-radius: 10px;
  font-size: 36px;
  border-color: #245b23;
  background:
    radial-gradient(circle at 50% 18%, rgba(255,255,255,.82) 0 11px, transparent 12px),
    linear-gradient(180deg, #c9f272 0%, #73bf39 54%, #277b35 100%);
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,.7),
    inset 0 -5px 0 rgba(19,78,33,.2),
    0 5px 0 #173b1f,
    0 10px 18px rgba(0,0,0,.24);
}

.game-menu .play-tab span {
  font-size: 17px;
}

.tabs button.active {
  background: var(--green);
  color: white;
}

.tabs.game-menu button.active {
  background:
    radial-gradient(circle at 50% 12%, rgba(255,255,255,.9) 0 8px, transparent 9px),
    linear-gradient(180deg, #ffffff 0%, #ffe070 52%, #f2ad31 100%);
  color: #173725;
  border-color: #225f2e;
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,.85),
    inset 0 -4px 0 rgba(94,60,14,.13),
    0 4px 0 #173b1f,
    0 0 0 2px rgba(126,211,64,.34),
    0 9px 13px rgba(0,0,0,.2);
}

.game-menu button:active {
  transform: translateY(2px);
  box-shadow: inset 0 2px 0 rgba(255,255,255,.55), 0 2px 0 #4a2b12;
}

.game-menu .play-tab:active {
  transform: translateY(-10px);
}

.course-list,
.shop-list,
.upgrade-list,
.round-list {
  display: grid;
  gap: 12px;
}

.card {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: white;
  box-shadow: 0 9px 24px rgba(23,55,37,.08);
}

.course-card,
.shop-card,
.upgrade-card,
.round-card {
  padding: 14px;
}

.course-card {
  display: grid;
  grid-template-columns: 92px 1fr auto;
  align-items: center;
  gap: 12px;
  text-align: left;
  overflow: hidden;
}

.course-thumb {
  width: 92px;
  aspect-ratio: 1.18;
  border-radius: 8px;
  overflow: hidden;
  background:
    linear-gradient(135deg, rgba(35,136,76,.82), rgba(138,215,239,.84)),
    repeating-linear-gradient(45deg, transparent 0 10px, rgba(255,255,255,.16) 10px 20px);
}

.course-thumb img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
}

.course-thumb.image-missing::after {
  content: "⛳";
  display: grid;
  place-items: center;
  width: 100%;
  height: 100%;
  color: white;
  font-size: 28px;
}

.muted {
  color: #657267;
}

.small {
  font-size: 13px;
}

.search {
  width: 100%;
  margin: 12px 0 16px;
}

.course-hero {
  position: relative;
  overflow: hidden;
  min-height: 190px;
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 18px;
  color: white;
  padding: 18px;
  border-radius: 8px;
  background:
    radial-gradient(circle at 80% 30%, rgba(255,255,255,.3), transparent 14rem),
    linear-gradient(135deg, #127844, #76d3ed);
}

.course-hero img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.course-hero-shade {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.62)),
    linear-gradient(90deg, rgba(0,0,0,.42), transparent 70%);
}

.course-hero > div:not(.course-hero-shade),
.course-hero .flag {
  position: relative;
  z-index: 1;
}

.course-hero .flag {
  font-size: 58px;
}

.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 14px;
}

.score-box {
  display: grid;
  gap: 14px;
  padding: 16px;
}

.range-wrap {
  height: 100%;
  min-height: 100%;
  overflow: hidden;
  position: relative;
  border-radius: 0;
  background:
    linear-gradient(180deg, #15aaf0 0 16%, #9de7ff 16% 19%, #3d9b4a 19% 100%);
}

.range-wrap.rainy-sky {
  background:
    linear-gradient(180deg, #5f7480 0 10%, #8799a1 10% 16%, #a7b4b3 16% 19%, #496f47 19% 100%);
}

.range-wrap.rainy-sky .sun {
  opacity: .16;
  filter: grayscale(1) blur(1px);
}

.range-wrap.rainy-sky .cloud {
  opacity: .9;
  background: #d0d6d8;
  box-shadow: 40px 8px 0 2px #bcc6c9, 78px 3px 0 -2px #e0e4e5;
}

.range-scene {
  position: relative;
  height: 100%;
  min-height: 100%;
  overflow: hidden;
  isolation: isolate;
}

.range-scene::before {
  content: "";
  position: absolute;
  inset: 19% 0 0;
  z-index: 0;
  background:
    radial-gradient(circle at 20% 28%, rgba(255,255,255,.18) 0 1px, transparent 2px),
    radial-gradient(circle at 70% 48%, rgba(255,215,40,.16) 0 1px, transparent 2px),
    linear-gradient(180deg, rgba(255,255,255,.08), transparent 18%),
    linear-gradient(180deg, #78c856 0%, #58ad43 45%, #2e7f39 100%);
}

.range-scene .forest-shadow-left,
.range-scene .forest-shadow-right {
  position: absolute;
  top: 18%;
  bottom: 0;
  z-index: 4;
  width: 18%;
  pointer-events: none;
}

.range-scene::after {
  content: "";
  position: absolute;
  left: -6%;
  right: -6%;
  bottom: 57px;
  z-index: 1;
  height: 20%;
  border-radius: 44% 44% 0 0;
  background:
    radial-gradient(circle at 18% 55%, rgba(255,255,255,.16) 0 2px, transparent 3px),
    radial-gradient(circle at 68% 38%, rgba(100,62,25,.18) 0 2px, transparent 3px),
    radial-gradient(circle at 44% 74%, rgba(255,255,255,.12) 0 1px, transparent 2px),
    linear-gradient(180deg, #d1a56a 0%, #b98047 70%, #82502e 100%);
  box-shadow: 0 -14px 26px rgba(93,64,34,.2), inset 0 10px 18px rgba(255,255,255,.14);
}

.sun {
  position: absolute;
  top: 28px;
  left: 58px;
  z-index: 0;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: #ffd45a;
  box-shadow: 0 0 34px rgba(255,212,90,.64);
}

.clubhouse {
  position: absolute;
  left: 12px;
  top: 112px;
  z-index: 7;
  width: 150px;
  height: 116px;
  border-radius: 7px 7px 4px 4px;
  background:
    linear-gradient(90deg, rgba(0,0,0,.1), transparent 18% 82%, rgba(0,0,0,.12)),
    repeating-linear-gradient(90deg, #9a632f 0 9px, #875326 9px 17px);
  border: 2px solid #4f2d13;
  box-shadow: 0 15px 20px rgba(26,69,30,.34);
}

.clubhouse::before {
  content: "";
  position: absolute;
  left: 10px;
  right: 10px;
  bottom: -10px;
  height: 15px;
  border-radius: 3px;
  background: repeating-linear-gradient(90deg, #7b4b22 0 12px, #5d3618 12px 24px);
  border: 2px solid #3a210f;
  box-shadow: 0 6px 0 rgba(0,0,0,.16);
}

.clubhouse::after {
  content: "";
  position: absolute;
  left: 54px;
  bottom: -30px;
  width: 44px;
  height: 27px;
  clip-path: polygon(18% 0, 82% 0, 100% 100%, 0 100%);
  background:
    repeating-linear-gradient(180deg, #c08b3f 0 7px, #8b5c29 7px 9px);
  border: 2px solid #4f2d13;
}

.clubhouse-roof {
  position: absolute;
  left: -12px;
  right: -10px;
  top: -28px;
  height: 48px;
  border-radius: 8px 8px 2px 2px;
  background:
    repeating-linear-gradient(135deg, #1f7d37 0 9px, #155c2c 9px 18px);
  transform: skewX(-8deg);
  border: 2px solid #0c3b21;
}

.clubhouse-sign {
  position: absolute;
  left: 31px;
  top: -14px;
  z-index: 2;
  width: 92px;
  padding: 6px 8px;
  border-radius: 5px;
  background: #21472b;
  border: 3px solid #6b461f;
  color: white;
  text-transform: uppercase;
  line-height: .9;
  font-weight: 1000;
  letter-spacing: .5px;
  transform: rotate(-5deg);
  box-shadow: 0 5px 0 rgba(0,0,0,.18);
}

.clubhouse-sign span {
  display: block;
  font-size: 14px;
}

.clubhouse-sign strong {
  color: #9ee644;
  font-size: 23px;
}

.clubhouse-awning {
  position: absolute;
  left: 24px;
  right: 18px;
  top: 42px;
  height: 18px;
  border-radius: 0 0 7px 7px;
  background: repeating-linear-gradient(90deg, #f8f2d7 0 13px, #277a38 13px 26px);
  border: 1px solid rgba(0,0,0,.22);
}

.clubhouse-door {
  position: absolute;
  left: 62px;
  bottom: 0;
  width: 28px;
  height: 42px;
  border-radius: 4px 4px 0 0;
  background: #244f2c;
  border: 2px solid #2a1c0f;
}

.clubhouse-window {
  position: absolute;
  bottom: 34px;
  width: 24px;
  height: 24px;
  border-radius: 4px;
  background: linear-gradient(135deg, #6bd2ff, #145ea5);
  border: 3px solid #3f250f;
}

.window-left { left: 22px; }
.window-right { right: 20px; }

.cloud {
  position: absolute;
  z-index: 0;
  width: 76px;
  height: 24px;
  border-radius: 999px;
  background: rgba(255,255,255,.78);
  box-shadow: 20px -8px 0 4px rgba(255,255,255,.72), 43px 1px 0 1px rgba(255,255,255,.65);
}

.cloud-a {
  top: 88px;
  left: 34px;
}

.cloud-b {
  top: 138px;
  right: 70px;
  transform: scale(.72);
  opacity: .72;
}

.fairway {
  position: absolute;
  left: 15%;
  right: 12%;
  top: 20%;
  bottom: 20%;
  z-index: 1;
  clip-path: polygon(28% 0, 72% 0, 98% 100%, 2% 100%);
  background:
    repeating-linear-gradient(90deg, rgba(255,255,255,.12) 0 28px, rgba(31,104,44,.08) 28px 56px),
    linear-gradient(180deg, #9bdc72 0%, #77c863 42%, #4e9a4a 100%);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.18), 0 24px 46px rgba(21,70,32,.24);
}

.forest-edge {
  position: absolute;
  top: 17%;
  bottom: 7%;
  z-index: 3;
  width: 24%;
  pointer-events: none;
  background:
    radial-gradient(circle at 20% 8%, #2e8a33 0 15px, transparent 16px),
    radial-gradient(circle at 65% 14%, #0f5f2e 0 22px, transparent 23px),
    radial-gradient(circle at 35% 25%, #58a52e 0 18px, transparent 19px),
    radial-gradient(circle at 78% 36%, #1f7937 0 24px, transparent 25px),
    radial-gradient(circle at 24% 48%, #0d4f29 0 28px, transparent 29px),
    radial-gradient(circle at 68% 61%, #3e9535 0 21px, transparent 22px),
    radial-gradient(circle at 32% 76%, #12602e 0 26px, transparent 27px),
    linear-gradient(90deg, rgba(9,48,28,.8), rgba(9,48,28,.18), transparent);
  filter: drop-shadow(0 8px 12px rgba(0,0,0,.18));
  opacity: .92;
}

.forest-left {
  left: -9%;
}

.forest-right {
  right: -9%;
  transform: scaleX(-1);
}

.fairway::before,
.fairway::after {
  content: "";
  position: absolute;
  top: -4%;
  bottom: -12%;
  width: 18%;
  opacity: .38;
  filter: blur(10px);
  background: #155c31;
}

.fairway::before {
  left: -24%;
}

.fairway::after {
  right: -24%;
}

.range-scene::selection {
  background: transparent;
}

.bunker {
  position: absolute;
  z-index: 2;
  width: 82px;
  height: 38px;
  border-radius: 54% 46% 50% 50%;
  background:
    radial-gradient(circle at 35% 45%, rgba(255,255,255,.32), transparent 20px),
    #e8d78d;
  box-shadow: inset 0 2px 7px rgba(117,91,38,.28), 0 7px 14px rgba(29,80,36,.18);
}

.bunker::before {
  content: "";
  position: absolute;
  inset: 7px 12px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 18% 40%, rgba(105,74,34,.32) 0 2px, transparent 3px),
    radial-gradient(circle at 55% 28%, rgba(105,74,34,.24) 0 2px, transparent 3px),
    radial-gradient(circle at 76% 66%, rgba(105,74,34,.28) 0 2px, transparent 3px);
}

.water {
  position: absolute;
  z-index: 3;
  border-radius: 48% 52% 44% 56%;
  background:
    radial-gradient(circle at 32% 26%, rgba(255,255,255,.52), transparent 20px),
    repeating-linear-gradient(145deg, rgba(255,255,255,.18) 0 7px, transparent 7px 15px),
    #1f94d2;
  border: 7px solid rgba(84,78,54,.72);
  box-shadow: inset 0 0 18px rgba(255,255,255,.28), 0 12px 20px rgba(27,85,114,.18);
}

.water::before {
  content: "";
  position: absolute;
  inset: -11px;
  z-index: -1;
  border-radius: inherit;
  background:
    radial-gradient(circle at 14% 18%, #76705b 0 9px, transparent 10px),
    radial-gradient(circle at 36% 4%, #9a947a 0 8px, transparent 9px),

.pond-splash {
  position: absolute;
  width: 22px;
  height: 12px;
  z-index: 7;
  pointer-events: none;
  transform: translate(-50%, -50%);
  border-radius: 999px;
  border: 2px solid rgba(238, 255, 255, .92);
  box-shadow:
    0 0 0 4px rgba(116, 218, 255, .32),
    0 0 12px rgba(255, 255, 255, .65);
  animation: pond-splash-pop .76s ease-out forwards;
}

.pond-splash::before,
.pond-splash::after {
  content: "";
  position: absolute;
  width: 5px;
  height: 5px;
  border-radius: 999px;
  background: rgba(245, 255, 255, .95);
  top: -5px;
}

.pond-splash::before {
  left: 4px;
  animation: splash-drop-left .76s ease-out forwards;
}

.pond-splash::after {
  right: 4px;
  animation: splash-drop-right .76s ease-out forwards;
}

@keyframes pond-splash-pop {
  0% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(.35);
  }
  22% {
    opacity: 1;
  }
  100% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(1.55);
  }
}

@keyframes splash-drop-left {
  100% {
    opacity: 0;
    transform: translate(-8px, -10px);
  }
}

@keyframes splash-drop-right {
  100% {
    opacity: 0;
    transform: translate(8px, -10px);
  }
}

.bay {
  position: relative;
  width: 100%;
  min-width: 0;
  height: 76px;
  min-height: 76px;
  display: grid;
  place-items: center;
  padding: 6px;
  border-radius: 9px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.14), rgba(0,0,0,.1)),
    repeating-linear-gradient(90deg, rgba(255,255,255,.08) 0 5px, transparent 5px 10px),
    rgba(48,68,54,.72);
  color: white;
  text-align: center;
  font-weight: 900;
  border: 3px solid #c99b2c;
  box-shadow: 0 6px 0 #3b270f, 0 12px 14px rgba(78,49,24,.32), inset 0 1px 0 rgba(255,255,255,.22);
  overflow: visible;
}

.bay-inner {
  position: relative;
  z-index: 2;
  display: grid;
  place-items: center;
  width: 100%;
  height: 100%;
  overflow: visible;
}

.bay-unlocked {
  background:
    radial-gradient(circle at 30% 24%, rgba(255,255,255,.22), transparent 28px),
    linear-gradient(180deg, rgba(255,255,255,.16), rgba(0,0,0,.18)),
    repeating-linear-gradient(90deg, rgba(255,255,255,.07) 0 6px, transparent 6px 12px),
    #116b37;
  border-color: #c49932;
  box-shadow: 0 6px 0 #4d3311, 0 12px 22px rgba(7,56,28,.34), inset 0 1px 0 rgba(255,255,255,.2);
}

.bay-available {
  background:
    linear-gradient(180deg, rgba(255,255,255,.16), rgba(0,0,0,.18)),
    #536b32;
  color: white;
  text-shadow: 0 2px 2px rgba(0,0,0,.45);
  border-color: #d0a032;
}

.bay-locked {
  background:
    linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.2)),

  text-shadow: 0 2px 2px rgba(0,0,0,.55);

}

.bay::before {
  content: "";
  position: absolute;
  inset: auto 8px 6px;
  height: 6px;
  border-radius: 999px;
  background: rgba(255,255,255,.18);
}

.bay::after {
  content: "";
  position: absolute;
  inset: 6px;
  border-radius: 6px;
  border: 1px dashed rgba(255,255,255,.16);

}

.tee-dot {
  position: absolute;
  left: 54%;
  bottom: 24px;
  width: 8px;
  height: 8px;
  transform: translateX(-50%);
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, white, #cfd5d2);
  box-shadow: 0 2px 3px rgba(0,0,0,.4);
}

.tee-dot::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 7px;
  width: 3px;
  height: 8px;
  transform: translateX(-50%);
  border-radius: 0 0 2px 2px;
  background: #f0d38b;
  box-shadow: 0 1px 1px rgba(0,0,0,.25);
}

.ball-tray {
  position: absolute;
  right: -2px;
  bottom: 9px;
  width: 18px;
  height: 31px;
  border-radius: 3px;
  background:
    radial-gradient(circle at 5px 5px, white 0 2px, transparent 3px),
    radial-gradient(circle at 12px 5px, white 0 2px, transparent 3px),
    radial-gradient(circle at 5px 12px, white 0 2px, transparent 3px),
    radial-gradient(circle at 12px 12px, white 0 2px, transparent 3px),
    radial-gradient(circle at 5px 19px, white 0 2px, transparent 3px),
    radial-gradient(circle at 12px 19px, white 0 2px, transparent 3px),
    linear-gradient(180deg, #1c3d2a, #0a2415);

.locked-content {

}

.locked-content .lock-icon {

}

.locked-content strong {

}

  color: #ffe16a;
  font-style: normal;
  font-size: 15px;

.golfer {
  --shirt: #d5372f;
  --cap: #bd221d;
  position: relative;
  z-index: 4;
  display: block;
  width: 30px;
  height: 45px;
  margin: 0 auto 0 4px;
  transform-origin: 50% 58%;
  filter: drop-shadow(0 4px 4px rgba(0,0,0,.25));
}

.golfer-2 { --shirt: #2375d8; --cap: #1453a7; }
.golfer-3 { --shirt: #1f8f3a; --cap: #116525; }
.golfer-4 { --shirt: #f0c52d; --cap: #c29114; }
.golfer-5 { --shirt: #9b59d0; --cap: #71339c; }

.golfer span {
  position: absolute;
  display: block;
}

.golfer-shadow {
  left: 2px;
  bottom: 0;
  width: 24px;
  height: 8px;
  border-radius: 50%;
  background: rgba(0,0,0,.22);
}

.golfer-leg {
  bottom: 6px;
  width: 6px;
  height: 16px;
  border-radius: 999px;
  background: #26312e;
  border: 1px solid rgba(0,0,0,.22);
}

.leg-left {
  left: 7px;
  transform: rotate(12deg);
}

.leg-right {
  right: 7px;
  transform: rotate(-12deg);
}

.golfer-body {
  left: 7px;
  top: 15px;
  width: 15px;
  height: 20px;
  border-radius: 8px 8px 7px 7px;
  background:
    radial-gradient(circle at 52% 14%, rgba(255,255,255,.25), transparent 7px),
    linear-gradient(180deg, var(--shirt), var(--shirt));
  border: 2px solid rgba(0,0,0,.25);
}

.golfer-head {
  left: 9px;
  top: 7px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #f0b36a;
  border: 1px solid rgba(0,0,0,.24);
}

.golfer-cap {
  left: 6px;
  top: 3px;
  width: 17px;
  height: 8px;
  border-radius: 10px 10px 4px 4px;
  background: var(--cap);
  border: 1px solid rgba(0,0,0,.32);
}

.golfer-cap::after {
  content: "";
  position: absolute;
  right: -6px;
  top: 4px;
  width: 8px;
  height: 3px;
  border-radius: 999px;
  background: var(--cap);
  border: 1px solid rgba(0,0,0,.25);
}

.golfer-arm {
  top: 18px;
  width: 6px;
  height: 17px;
  border-radius: 999px;
  background: #f0b36a;
  border: 1px solid rgba(0,0,0,.22);
  transform-origin: top center;
}

.arm-left {
  left: 3px;
  transform: rotate(32deg);
}

.arm-right {
  right: 1px;
  transform: rotate(-36deg);
}

.golf-club {
  right: -5px;
  top: 20px;
  width: 2px;
  height: 27px;
  border-radius: 999px;
  background: linear-gradient(90deg, #d4d7d8, #5d6265);
  transform: rotate(-34deg);
  transform-origin: 50% 12%;
}

.golf-club::after {
  content: "";
  position: absolute;
  left: -5px;
  bottom: -3px;
  width: 9px;
  height: 3px;
  border-radius: 4px;
  background: #555b5c;
  transform: rotate(10deg);
}

.bay div {
  position: relative;
  z-index: 1;
  font-size: 11px;
  line-height: 1.15;
}

.bay .golfer {
  z-index: 4;
  justify-self: start;
}

.bay-unlocked > div {
  display: grid;
  place-items: center;
  width: 100%;
  height: 100%;
}

.golfer.swinging {
  animation: golfer-body-hit 1.05s ease-in-out;
}

.golfer.swinging .golf-club,
.golfer.swinging .arm-right {
  animation: club-hit 1.05s ease-in-out;
}

@keyframes swing-hit {
  0% { transform: translateX(-7px) rotate(-18deg); }
  45% { transform: translateX(-7px) rotate(26deg) translateY(-2px); }
  68% { transform: translateX(-7px) rotate(12deg); }
  100% { transform: translateX(-7px) rotate(-8deg); }
}

@keyframes golfer-body-hit {
  0% { transform: rotate(-8deg); }
  45% { transform: rotate(12deg) translateY(-1px); }
  100% { transform: rotate(0deg); }
}

@keyframes club-hit {
  0% { transform: rotate(-72deg); }
  42% { transform: rotate(38deg); }
  70% { transform: rotate(10deg); }
  100% { transform: rotate(-34deg); }
}

.shack-swing-golfer,
.bay .shack-swing-golfer {
  width: 60px;
  height: 74px;
  margin: 0 auto 0 0;
  justify-self: start;
  align-self: center;
  overflow: hidden;
  background-image: url("assets/golfer-bay-swing-sprite.png?v=aligned2");
  background-repeat: no-repeat;
  background-size: 400% 200%;
  background-position: 0% 0%;
  transform: translateX(-3px) translateY(-12px) rotate(4deg) scale(1.24);
  transform-origin: 50% 78%;
  filter: drop-shadow(0 4px 3px rgba(0,0,0,.28));
}

.shack-swing-golfer.golfer-2,
.shack-swing-golfer.golfer-3,
.shack-swing-golfer.golfer-4,
.shack-swing-golfer.golfer-5 {
  background-position: 0% 0%;
}

.shack-swing-golfer.swinging {
  animation: shack-swing-cycle 1.18s steps(1, end) both;
}

@keyframes shack-swing-cycle {
  0% {
    background-position: 0% 0%;
    transform: translateX(-3px) translateY(-12px) rotate(4deg) scale(1.24);
  }
  18% {
    background-position: 33.333% 0%;
    transform: translateX(-3px) translateY(-12px) rotate(4deg) scale(1.24);
  }
  36% {
    background-position: 66.666% 0%;
    transform: translateX(-3px) translateY(-12px) rotate(4deg) scale(1.24);
  }
  54% {
    background-position: 0% 100%;
    transform: translateX(-3px) translateY(-12px) rotate(4deg) scale(1.24);
  }
  72% {
    background-position: 33.333% 100%;
    transform: translateX(-3px) translateY(-12px) rotate(4deg) scale(1.24);
  }
  90% {
    background-position: 66.666% 100%;
    transform: translateX(-3px) translateY(-12px) rotate(4deg) scale(1.24);
  }
  100% {
    background-position: 100% 100%;
    transform: translateX(-3px) translateY(-12px) rotate(4deg) scale(1.24);
  }
}

.range-buttons {

.range-mode .range-buttons {
  position: absolute;
  left: 228px;
  top: 92px;
  z-index: 12;
}

.range-mode .range-buttons .ghost,
.range-mode .range-buttons .primary {
  display: grid;
  grid-template-columns: 22px 1fr;

  line-height: 1.05;

.range-mode .range-buttons span {

.range-mode .range-buttons .ghost {

}

.modal-backdrop {
  position: absolute;
  inset: 0;
  z-index: 80;
  display: grid;
  place-items: center;
  padding: 18px;
  background: rgba(0,0,0,.44);
}

.modal {
  width: min(720px, 100%);
  max-height: min(720px, 88vh);
  overflow: auto;
  border-radius: 8px;
  padding: 16px;
  background: white;
}

.upgrades-backdrop {
  padding: 0;
  place-items: stretch;
  background: rgba(10, 20, 12, .56);
}

.upgrades-modal {
  width: 100%;
  height: 100%;
  max-height: none;
  display: grid;
  grid-template-rows: auto auto 1fr;
  gap: 10px;
  overflow: hidden;
  border-radius: 0;
  padding: 54px 12px 86px;
  background:
    radial-gradient(circle at 18% 8%, rgba(244,197,66,.24), transparent 130px),
    linear-gradient(180deg, #f7fbef 0%, #e7f0df 100%);

.modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}

.upgrade-tabs {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 5px;
  overflow: visible;
  padding-bottom: 0;
}

.upgrade-tabs button {
  min-height: 56px;
  display: grid;
  place-items: center;
  gap: 2px;
  padding: 6px 3px;
  white-space: normal;
  line-height: 1;
  font-size: 18px;
}

.upgrade-tabs button strong {
  max-width: 100%;
  overflow-wrap: anywhere;
  color: inherit;
  font-size: 9px;
  line-height: 1.05;
  text-transform: uppercase;
}

.upgrade-list {
  min-height: 0;
  overflow-y: auto;
  scrollbar-width: none;
  padding: 2px 1px 10px;
}

.upgrade-list::-webkit-scrollbar {
  display: none;
}

.upgrade-card {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: center;
}

.progress {
  width: 100%;
  height: 8px;
  border-radius: 999px;
  background: #dfe7df;
  overflow: hidden;
  margin-top: 8px;
}

.progress span {
  display: block;
  height: 100%;
  background: var(--green);
}

.profile-grid {
  display: grid;
  gap: 14px;
}

.profile-card {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 16px;
  align-items: center;
  padding: 16px;
}

.ring {
  --p: 0%;
  width: 112px;
  height: 112px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: conic-gradient(var(--green) var(--p), #dce5dc 0);
}

.ring-inner {
  width: 86px;
  height: 86px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: white;
  text-align: center;
  font-weight: 1000;
}

.shop-card {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 14px;
  align-items: center;
}

.upgrade-card.active-cosmetic {
  border-color: rgba(35,136,76,.72);
  background: linear-gradient(180deg, #eaffef, #ffffff);
}

.shop-card.owned {
  background: linear-gradient(180deg, #fff9d7, #ffffff);
  border-color: rgba(244,197,66,.72);
}

.shop-icon {
  font-size: 34px;
}

.toast {
  position: absolute;
  left: 50%;
  bottom: 104px;
  z-index: 95;
  max-width: calc(100% - 36px);
  transform: translateX(-50%);
  padding: 10px 14px;
  border-radius: 999px;
  background: rgba(21, 32, 25, .92);
  color: white;
  font-weight: 900;
  text-align: center;
  box-shadow: 0 12px 28px rgba(0,0,0,.25);
}

@media (max-width: 760px) {
  .range-hud {
    right: 14px;
    left: auto;
    transform: none;
  }

  .stats {
    grid-template-columns: repeat(3, 1fr);
  }

  .range-scene {
    min-height: 620px;
  }

  .course-card,
  .shop-card,
  .profile-card {
    grid-template-columns: 1fr;
  }

  .course-thumb {
    width: 100%;
    aspect-ratio: 1.85;
  }

  .bays {
    gap: 5px;
  }

  .bay {
    min-height: 74px;
    font-size: 12px;
  }

  .tabs button {
    font-size: 11px;
  }

.sprite-golfer {
  position: absolute;
  left: 40%;
  bottom: 16px;
  width: 72px;
  height: 72px;
  margin: 0;
  transform: translateX(-50%);
  background-image: var(--golfer-sprite-sheet);
  background-size: 400% 200%;
  background-position: 100% 0;
  background-repeat: no-repeat;
  image-rendering: auto;
  filter: drop-shadow(0 4px 4px rgba(0,0,0,.28));
}

.bay .sprite-golfer {
  z-index: 5;
  justify-self: center;
}

.sprite-golfer.swinging {
  animation: sprite-golfer-swing 1.12s steps(1, end);
}

@keyframes sprite-golfer-swing {
  0% { background-position: 100% 0; }
  13% { background-position: 0 0; }
  26% { background-position: 33.333% 0; }
  39% { background-position: 66.666% 0; }
  52% { background-position: 0 100%; }
  65% { background-position: 33.333% 100%; }
  78% { background-position: 66.666% 100%; }
  91%, 100% { background-position: 100% 100%; }
}
.range-scene.cosmetic-night-time-range::before { filter: brightness(.55) saturate(.9) hue-rotate(18deg); }
.range-scene.cosmetic-night-time-range { background: linear-gradient(180deg, #15264a 0%, #253f57 24%, transparent 24%); }
.range-scene.cosmetic-night-time-range .sun {
  background:
    radial-gradient(circle at 34% 32%, rgba(150,156,160,.62) 0 4px, transparent 5px),
    radial-gradient(circle at 62% 46%, rgba(134,140,146,.48) 0 3px, transparent 4px),
    radial-gradient(circle at 48% 70%, rgba(160,166,170,.42) 0 5px, transparent 6px),
    radial-gradient(circle at 72% 24%, rgba(126,132,138,.32) 0 2px, transparent 3px),
    #f5f4e8;
  box-shadow: 0 0 26px rgba(237,240,232,.62), 0 0 52px rgba(192,205,218,.26);
  filter: none;
}
.range-scene.cosmetic-rainy-range::before { filter: brightness(.78) saturate(.82); }

function currentSaveData() {

function applySaveData(save) {
  if (!save) return;
  state.playerName = save.playerName || state.playerName;
  state.coins = Number.isFinite(save.coins) ? save.coins : state.coins;
  state.totalCoins = Number.isFinite(save.totalCoins) ? save.totalCoins : state.totalCoins;
  state.gems = Number.isFinite(save.gems) ? save.gems : state.gems;
  state.unlockedBays = Math.min(5, Math.max(1, save.unlockedBays || state.unlockedBays));
  state.ballId = save.ballId || state.ballId;
  state.balls = Array.isArray(save.balls) ? save.balls.slice(-50) : state.balls;
  state.recentRounds = Array.isArray(save.recentRounds) ? save.recentRounds : state.recentRounds;
  state.shopBoost = Number.isFinite(save.shopBoost) ? save.shopBoost : state.shopBoost;
  state.shopPurchases = Array.isArray(save.shopPurchases) ? save.shopPurchases : state.shopPurchases;
  state.activeCosmetic = save.activeCosmetic || null;
  if (save.upgrades) {
    state.upgrades.forEach((item) => {
      if (Number.isFinite(save.upgrades[item.id])) item.level = Math.min(item.max, Math.max(0, save.upgrades[item.id]));
    });
  }
}

async function loadCloudGame() {
  const ref = playerDocRef();
  if (!ref) return;
  try {
    const snap = await ref.get();
    if (snap.exists) {
      applySaveData(snap.data());
      saveGame(false);
    } else {
      await ref.set(currentSaveData(), { merge: true });
    }
  } catch (error) {
    console.warn("Cloud load failed", error);
  }
}

}

  try {

function coinsPerSecond() {
  const shotsPerSecond = state.unlockedBays / 7.5;
  return Math.max(1, Math.floor(shotsPerSecond * rangeRushShotCoins()));
}

function level() {
  const upgradeLevels = state.upgrades.reduce((sum, item) => sum + item.level, 0);
  return Math.max(1, 1 + state.recentRounds.length * 2 + Math.floor(upgradeLevels / 4) + Math.floor(state.totalCoins / 50000));
}

function levelProgress() {
  const upgradeLevels = state.upgrades.reduce((sum, item) => sum + item.level, 0);
  return ((state.recentRounds.length * 17 + upgradeLevels * 9 + Math.floor(state.totalCoins / 1000)) % 100);
}

function scheduleNextHit(bayNumber, fromNow = true) {
  state.nextHits[bayNumber] = Date.now() + (fromNow ? randomHitDelay() : 500);
}

function randomHitDelay() {
  return 5000 + Math.floor(Math.random() * 5001);
}

function ensureHitSchedules() {
  for (let bayNumber = 1; bayNumber <= state.unlockedBays; bayNumber += 1) {
    if (!state.nextHits[bayNumber]) scheduleNextHit(bayNumber, bayNumber !== 1);
  }
}

function launchBall(bayNumber) {
  state.balls = state.balls.filter((b) => b.y <= 56);
  const hitDelay = 780;
  const flightDuration = 1700;
  const swingDuration = 1180;
  const starts = {
    1: [12, 78],
    2: [31, 78],
    3: [50, 78],
    4: [69, 78],
    5: [88, 78],
  };
  const [startX, startY] = starts[bayNumber] || [50, 78];
  const bullseyeTargets = [
    { x: 54, y: 27 },
    { x: 31, y: 39 },
    { x: 49, y: 51 },
  ];
  const isBullseye = Math.random() < rangeRushBullseyeChance();
  const chosenTarget = bullseyeTargets[Math.floor(Math.random() * bullseyeTargets.length)];
  const endX = isBullseye ? chosenTarget.x : Math.floor(18 + Math.random() * 74);
  const endY = isBullseye ? chosenTarget.y : Math.floor(18 + Math.random() * 37);
  const ballSkin = rangeRushCurrentBallSkin();
  const ball = {
    id: state.ballId++,
    bay: bayNumber,
    sx: startX,
    sy: startY,
    mx: Math.round((startX + endX) / 2),
    apex: Math.max(10, startY - 32),
    x: endX,
    y: endY,
    bullseye: isBullseye,
    color: ballSkin.color,
    highlight: ballSkin.highlight,
  };
  state.swingingBays[bayNumber] = true;
  startGolferSwing(bayNumber);
  window.setTimeout(() => {
    state.flyingBalls.push(ball);
    addFlyingBallElement(ball);
    rangeRushAwardBallHitCoins();
    rangeRushTryAwardGem(ball);
    if (state.tab === "range") updateRangeStats();
  }, hitDelay);
  window.setTimeout(() => {
    delete state.swingingBays[bayNumber];
    stopGolferSwing(bayNumber);
  }, swingDuration);
  window.setTimeout(() => {
    const splashed = !ball.bullseye && isPondLanding(ball.x, ball.y);
    if (ball.bullseye && typeof state !== "undefined" && state) {
      state.coins += 500;
      state.totalCoins += 500;
      saveGame();
      showBullseyeBonus(ball);
      if (state.tab === "range") updateRangeStats();
    }
    if (!splashed) {
      state.balls.push({ id: ball.id, x: ball.x, y: ball.y, color: ball.color, highlight: ball.highlight });
      state.balls = state.balls.filter((b) => b.y <= 56);
    }
    let removedBall;
    if (!splashed && state.balls.length > 50) {
      removedBall = state.balls.shift();
    }
    state.flyingBalls = state.flyingBalls.filter((item) => item.id !== ball.id);
    if (splashed) {
      splashBallElement(ball);
    } else {
      settleBallElement(ball, removedBall);
    }
  }, hitDelay + flightDuration);
}

function isPondLanding(x, y) {
  const ponds = [
    { cx: 21, cy: 32, rx: 10, ry: 6 },
    { cx: 79, cy: 40, rx: 12, ry: 8 },
  ];
  return ponds.some((pond) => {
    const dx = (x - pond.cx) / pond.rx;
    const dy = (y - pond.cy) / pond.ry;
    return dx * dx + dy * dy <= 1;
  });
}

function splashBallElement(ball) {

function addFlyingBallElement(ball) {
  const scene = document.querySelector(".range-scene");

  const el = document.createElement("div");
  el.className = "flying-ball";
  el.dataset.ballId = String(ball.id);

  el.style.setProperty("--sy", `${ball.sy}%`);
  el.style.setProperty("--mx", `${ball.mx}%`);
  el.style.setProperty("--apex", `${ball.apex}%`);
  el.style.setProperty("--ex", `${ball.x}%`);
  el.style.setProperty("--ey", `${ball.y}%`);
  el.style.setProperty("--ball-color", ball.color || "#ffffff");
  el.style.setProperty("--ball-highlight", ball.highlight || "#ffffff");
  scene.appendChild(el);
}

function settleBallElement(ball, removedBall) {
  document.querySelector(`.flying-ball[data-ball-id="${ball.id}"]`)?.remove();
  if (removedBall) {
    document.querySelector(`.landed-ball[data-ball-id="${removedBall.id}"]`)?.remove();
  }
  const scene = document.querySelector(".range-scene");
  if (!scene) return;
  const el = document.createElement("div");
  el.className = "ball landed-ball";
  el.dataset.ballId = String(ball.id);
  el.style.left = `${ball.x}%`;
  el.style.top = `${ball.y}%`;
  el.style.setProperty("--ball-color", ball.color || "#ffffff");
  el.style.setProperty("--ball-highlight", ball.highlight || "#ffffff");
  scene.appendChild(el);
}

function startGolferSwing(bayNumber) {
  const golfer = document.querySelector(`[data-bay="${bayNumber}"] .golfer`);
  golfer?.classList.add("swinging");
}

function stopGolferSwing(bayNumber) {
  const golfer = document.querySelector(`[data-bay="${bayNumber}"] .golfer`);

}

function updateRangeStats() {
  document.querySelector("[data-stat='coins']")?.replaceChildren(document.createTextNode(short(state.coins)));
  document.querySelector("[data-stat='cps']")?.replaceChildren(document.createTextNode(fmt(rangeRushShotCoins())));
  document.querySelector("[data-stat='gems']")?.replaceChildren(document.createTextNode(fmt(state.gems || 0)));
}

function bayCost(bay) {
  return ({ 2: 75000, 3: 300000, 4: 900000, 5: 2500000 })[bay] || 0;
}

function fmt(n) {
  return Number(n).toLocaleString();
}

function short(n) {
  if (n >= 1000000) return `${(n / 1000000).toFixed(n < 10000000 ? 1 : 0).replace(".0", "")}M`;
  if (n >= 1000) return `${(n / 1000).toFixed(n < 10000 ? 1 : 0).replace(".0", "")}K`;
  return `${n}`;
}

function render() {
  app.innerHTML = state.authed ? shell() : auth();
  bind();
  restoreUpgradeScroll();
  restorePageScroll();
}

function restoreUpgradeScroll() {
  if (state.modal !== "upgrades") return;
  const list = document.querySelector(".upgrade-list");
  if (!list) return;
  list.scrollTop = state.upgradeScrollTop || 0;
}

function restorePageScroll() {
  if (state.tab !== "shop") return;
  const content = document.querySelector(".content");
  if (!content) return;
  content.scrollTop = state.shopScrollTop || 0;
}

function saveShopScroll() {
  const content = document.querySelector(".content");
  state.shopScrollTop = content ? content.scrollTop : state.shopScrollTop;
}

function showToast(message, duration = 2000) {
  state.toast = message;
  if (state.toastTimer) window.clearTimeout(state.toastTimer);
  state.toastTimer = window.setTimeout(() => {
    state.toast = null;
    state.toastTimer = null;
    render();
  }, duration);
}

  return `

function bind() {
  document.querySelectorAll("[data-auth-mode]").forEach((button) => {
    button.onclick = () => {
      state.authMode = button.dataset.authMode;
      render();
    };
  });
  const loginButton = document.querySelector("[data-login]");
  if (loginButton) loginButton.onclick = handleFirebaseAuth;
  document.querySelectorAll("[data-tab]").forEach((button) => {
    button.onclick = () => {
      state.tab = button.dataset.tab;
      state.selectedCourse = null;
      state.scoreMode = null;
      render();
    };
  });
  const search = document.querySelector("#courseSearch");
  if (search) {
    search.oninput = () => {
      const term = search.value.toLowerCase();
      document.querySelector("#courseList").innerHTML = courses
        .filter((c) => `${c.name} ${c.city} ${c.st}`.toLowerCase().includes(term))
        .map(courseCard)
        .join("");
      bindCourseCards();
    };
  }
  bindCourseCards();
  document.querySelector("[data-back-courses]")?.addEventListener("click", () => {
    state.selectedCourse = null;
    render();
  });
  document.querySelectorAll("[data-score-mode]").forEach((button) => {
    button.onclick = () => {
      state.scoreMode = button.dataset.scoreMode;
      render();
    };
  });
  document.querySelector("[data-cancel-score]")?.addEventListener("click", () => {
    state.scoreMode = null;
    render();
  });
  document.querySelector("[data-submit-score]")?.addEventListener("click", () => {
    const score = Number(document.querySelector("#scoreInput").value || 90);
    const scoreQuality = Math.max(0, 110 - score);
    const goodScoreBonus = Math.pow(scoreQuality, 1.28) * 640;
    const courseBonus = state.selectedCourse.difficulty * 180;
    const liveBonus = state.scoreMode === "Keep Score Live" ? 9000 : 6000;
    const earned = Math.floor(Math.max(12000, goodScoreBonus + courseBonus + liveBonus) * state.shopBoost);
    state.coins += earned;
    state.totalCoins += earned;
    state.recentRounds.unshift({ course: state.selectedCourse.name, score, mode: state.scoreMode, coins: earned });
    state.recentRounds = state.recentRounds.slice(0, 8);
    saveGame();
    showToast(`+${fmt(earned)} coins`);
    state.selectedCourse = null;
    state.scoreMode = null;
    state.tab = "range";
    render();
  });
  document.querySelectorAll("[data-bay]").forEach((button) => {
    button.onclick = () => {
      const n = Number(button.dataset.bay);
      if (n === state.unlockedBays + 1 && state.coins >= bayCost(n)) {
        state.coins -= bayCost(n);
        state.unlockedBays = n;
        saveGame();
        scheduleNextHit(n, false);
        render();
      }
    };
  });
  document.querySelectorAll("[data-modal]").forEach((button) => {
    button.onclick = () => {
      state.modal = button.dataset.modal;
      render();
    };
  });
  document.querySelectorAll("[data-close]").forEach((button) => {
    button.onclick = (event) => {
      event.preventDefault();
      event.stopPropagation();
      state.modal = null;
      render();
    };
  });
  document.querySelector(".modal-backdrop")?.addEventListener("click", (event) => {
    if (event.target.classList.contains("modal-backdrop") && state.modal === "location") {
      state.modal = null;
      render();
    }
  });
  document.querySelectorAll("[data-upgrade-tab]").forEach((button) => {
    button.onclick = () => {
      state.upgradeTab = button.dataset.upgradeTab;
      render();
    };
  });
  document.querySelectorAll("[data-upgrade]").forEach((button) => {
    button.onclick = () => {
      const upgradeList = button.closest(".upgrades-modal")?.querySelector(".upgrade-list");
      state.upgradeScrollTop = upgradeList ? upgradeList.scrollTop : state.upgradeScrollTop;
      const item = state.upgrades.find((u) => u.id === button.dataset.upgrade);
      const cost = Math.floor(item.base * Math.pow(1.72, item.level));
      if (!item) return;
      if (item.category === "Cosmetics" && item.level >= item.max) {
        state.activeCosmetic = state.activeCosmetic === item.cosmetic ? null : item.cosmetic;
        saveGame();
        showToast(state.activeCosmetic ? `${item.name} on` : `${item.name} off`);
        render();
        return;
      }
      if (item.level < item.max && state.coins >= cost) {
        state.coins -= cost;
        item.level += 1;
        if (item.category === "Cosmetics") state.activeCosmetic = item.cosmetic;
        saveGame();
        showToast(`${item.name} unlocked`);
        render();
      }
    };
  });
  document.querySelector("[data-reset-progress]")?.addEventListener("click", () => {
    resetGameProgress();
  });
  document.querySelector("[data-test-coins]")?.addEventListener("click", () => {
    saveShopScroll();
    state.coins += 500000;
    state.totalCoins += 500000;
    saveGame();
    showToast("+500K test coins", 2000);
    render();
  });
  document.querySelectorAll("[data-shop]").forEach((button) => {
    button.onclick = () => {
      saveShopScroll();
      const id = button.dataset.shop;
      if (state.shopPurchases.includes(id)) return;
      const rewards = {
        "founders-driver": { coins: 25000, boost: .2 },
        "double-pass": { coins: 0, boost: 1 },
        "grinder-pack": { coins: 85000, boost: .35 },
        "golden-bundle": { coins: 250000, boost: .5 },
      };
      const reward = rewards[id];
      if (!reward) return;
      state.shopPurchases.push(id);
      state.shopBoost += reward.boost;
      state.coins += reward.coins;
      state.totalCoins += reward.coins;
      saveGame();
      showToast(`${button.closest(".shop-card").querySelector("h3").textContent} added`);
      render();
    };
  });
}


async function handleFirebaseAuth(event) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  const nameInput = document.querySelector("#name");
  const emailInput = document.querySelector("#email");
  const passwordInput = document.querySelector("#password");
  const name = nameInput ? nameInput.value.trim() : "";
  const email = emailInput ? emailInput.value.trim() : "";
  const password = passwordInput ? passwordInput.value : "";
  if (!email || !password) {
    showToast("Enter email and password");
    return;
  }
  if (password.length < 6) {
    showToast("Password needs 6+ characters");
    return;
  }
  if (!initFirebaseIfReady()) {
    showToast("Firebase is still loading. Try again.");
    return;
  }
  try {
    const result = state.authMode === "Sign Up"
      ? await firebaseAuth.createUserWithEmailAndPassword(email, password)
      : await firebaseAuth.signInWithEmailAndPassword(email, password);
    firebaseUser = result.user;
    await loadCloudGame();
    state.playerName = name || state.playerName || firebaseUser.displayName || email.split("@")[0] || "Rookie Ranger";
    if (name && firebaseUser.updateProfile) {
      try {
        await firebaseUser.updateProfile({ displayName: name });
      } catch (error) {}
    }
    forceRangeRushCourses(event);
    await saveCloudGameNow();
  } catch (error) {
    const message = firebaseAuthMessage(error);
    showToast(message, 3000);
  }
}

function firebaseAuthMessage(error) {
  const code = error?.code || "";
  if (code.includes("email-already-in-use")) return "Email already has an account";
  if (code.includes("user-not-found") || code.includes("invalid-credential")) return "No account found for that login";
  if (code.includes("wrong-password")) return "Wrong password";
  if (code.includes("invalid-email")) return "Enter a valid email";
  if (code.includes("weak-password")) return "Password needs 6+ characters";
  return "Login failed. Check Firebase setup.";
}

function forceRangeRushCourses(event) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  const nameInput = document.querySelector("#name");
  const name = nameInput ? nameInput.value.trim() : "";
  state.playerName = name || state.playerName || "Rookie Ranger";
  try {
    localStorage.setItem("rangeRushFirstLoginCompleteV2", "1");
  } catch (error) {}
  state.authed = true;
  state.modal = null;
  state.selectedCourse = null;
  state.scoreMode = null;
  state.tab = "courses";
  saveGame();
  render();
}


function bindCourseCards() {
  document.querySelectorAll("[data-course]").forEach((button) => {
    button.onclick = () => {
      state.selectedCourse = courses.find((c) => c.id === Number(button.dataset.course));
      render();
    };
  });
}

setInterval(() => {
  if (!state.authed) return;
  if (state.tab === "range") updateRangeStats();
}, 1000);

setInterval(() => {
  if (!state.authed) return;
  ensureHitSchedules();
  const now = Date.now();
  for (let bayNumber = 1; bayNumber <= state.unlockedBays; bayNumber += 1) {
    if (now >= state.nextHits[bayNumber] && !state.swingingBays[bayNumber]) {
      launchBall(bayNumber);
      scheduleNextHit(bayNumber);
    }
  }
}, 300);

setInterval(function rangeRushAutosave() {
  if (state.authed) saveGame();
}, 5000);

window.addEventListener("load", initFirebaseIfReady);
render();

function rangeRushPurchased(category) {
  return state.upgrades.filter((item) => item.category === category && item.level > 0);
}

function rangeRushBestUpgrade(category, key) {
  const purchased = rangeRushPurchased(category).filter((item) => item[key] !== undefined);
  return purchased[purchased.length - 1];
}

function rangeRushBallValue() {
  return rangeRushBestUpgrade("Golf Balls", "value")?.value || 1;
}

function rangeRushClubMultiplier() {
  return rangeRushBestUpgrade("Clubs", "multiplier")?.multiplier || 1;
}

function rangeRushShotCoins() {
  return Math.max(1, Math.floor(rangeRushBallValue() * rangeRushClubMultiplier() * state.shopBoost));
}

function rangeRushBullseyeChance() {
  const targetCount = rangeRushPurchased("Targets").length;
  return .005 + (targetCount / 10) * .095;
}

function rangeRushGemChance() {
  const rangeCount = rangeRushPurchased("Range Upgrades").length;
  return .005 + (rangeCount / 5) * .045;
}

function rangeRushCurrentBallSkin() {
  const best = rangeRushBestUpgrade("Golf Balls", "skin");
  return best ? { key: best.skin, color: best.color, highlight: best.highlight } : { key: "classic", color: "#ffffff", highlight: "#ffffff" };
}

function rangeRushAwardBallHitCoins() {
  const earned = rangeRushShotCoins();
  state.coins += earned;
  state.totalCoins += earned;
  saveGame();
}

function rangeRushTryAwardGem(ball) {
  if (Math.random() >= rangeRushGemChance()) return;
  state.gems = (state.gems || 0) + 1;
  saveGame();
  showGemBonus(ball);
}

function rangeRushCosmeticClass() {
  return state.activeCosmetic ? `cosmetic-${state.activeCosmetic}` : "";
}

function rangeRushApplyBallSkin() {}
function rangeRushApplyCosmetic() {}
</script>
</body>
</html>
